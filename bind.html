<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE綁定</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body style="font-family:Arial;padding:24px;">
  <h2>LINE綁定中...</h2>
  <div id="log">準備綁定...</div>

<script>
const LIFF_ID = "2010501580-tk9UAT4D";

const API_URL =
"https://script.google.com/macros/s/AKfycby09EEwCpP_5YE8qcwfI_ytbSPmoOkpWSQ6eNO58NMGlbPPNaWLSz1BQhDmHaBZhoCxsw/exec";

function show(msg){
  document.getElementById("log").innerHTML += "<br>" + msg;
}

async function init(){
  try{
    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    let username =
      localStorage.getItem("bind_username") ||
      new URLSearchParams(location.search).get("username");

    if(!username){
      username = prompt("請輸入你的後台帳號，例如 boss 或 C8");
    }

    if(!username){
      document.body.innerHTML = "<h2>❌ 綁定失敗：沒有輸入後台帳號</h2>";
      return;
    }

    show("LINE UserId：" + profile.userId);
    show("後台帳號：" + username);
    show("準備寫入系統...");

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "bindLine",
        username: username,
        userId: profile.userId
      })
    });

    const result = await res.json();

    if(!result.ok){
      document.body.innerHTML = `
        <h2>❌ LINE綁定失敗</h2>
        <p>${result.message || "寫入失敗"}</p>
        <p>後台帳號：${username}</p>
        <p>LINE UserId：${profile.userId}</p>
      `;
      return;
    }

    localStorage.removeItem("bind_username");

    document.body.innerHTML = `
      <h2>✅ LINE綁定成功</h2>
      <p>LINE名稱：${profile.displayName}</p>
      <p>LINE UserId：${profile.userId}</p>
      <p>已寫入後台帳號：${username}</p>
      <button onclick="location.href='admin.html'">回後台</button>
    `;

  }catch(error){
    document.body.innerHTML = `
      <h2>❌ 綁定錯誤</h2>
      <p>${error.message}</p>
    `;
    console.error(error);
  }
}

init();
</script>
</body>
</html>
