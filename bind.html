<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE綁定測試</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<h2>LINE綁定測試中...</h2>

<script>
const LIFF_ID = "2010501580-tk9UAT4D";

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    document.body.innerHTML = `
      <h2>LIFF 測試結果</h2>
      <p>displayName：${profile.displayName || "沒有"}</p>
      <p>userId：${profile.userId || "沒有抓到"}</p>
      <pre>${JSON.stringify(profile, null, 2)}</pre>
    `;
  } catch (error) {
    document.body.innerHTML = `
      <h2>錯誤</h2>
      <p>${error.message}</p>
    `;
  }
}

init();
</script>
</body>
</html>
