<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>硯赫科技｜管理後台</title>

  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <div id="loginPage" class="login-page">
    <div class="login-card">
      <h1>硯赫科技</h1>
      <p>驗屋預約管理系統</p>

      <input id="loginUsername" type="text" placeholder="帳號" />
      <input id="loginPassword" type="password" placeholder="密碼" />

      <button id="loginBtn">登入</button>

      <div class="login-divider">尚未有帳號？</div>

      <button id="showRegisterBtn" class="secondary-btn">
        申請帳號
      </button>

      <div id="loginMsg" class="msg"></div>
    </div>

    <div id="registerBox" class="login-card hidden">
      <h1>申請帳號</h1>
      <p>送出後等待老闆核准</p>

      <input id="regName" type="text" placeholder="姓名" />
      <input id="regUsername" type="text" placeholder="帳號" />
      <input id="regPassword" type="password" placeholder="密碼" />
      <input id="regPhone" type="text" placeholder="電話，可不填" />
      <input id="regEmail" type="email" placeholder="Email，可不填" />
      <input id="regLineUserId" type="text" placeholder="LINE UserId，可不填" />

      <button id="registerBtn">送出申請</button>

      <button id="hideRegisterBtn" class="secondary-btn">
        返回登入
      </button>

      <div id="registerMsg" class="msg"></div>
    </div>
  </div>

  <div id="adminPage" class="admin-page hidden">

    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">🏠</div>
        <div>
          <h2>硯赫科技</h2>
          <p id="userInfo">載入中...</p>
        </div>
      </div>

      <nav>
        <button class="nav-btn active" data-page="dashboardPage">
          📊 Dashboard
        </button>

        <button class="nav-btn" data-page="bookingsPage">
          📋 預約案件
        </button>

        <button id="accountsNavBtn" class="nav-btn" data-page="accountsPage">
          👥 帳號管理
        </button>
      </nav>

      <button id="logoutBtn" class="logout-btn">
        登出
      </button>
    </aside>

    <main class="main">

      <section id="dashboardPage" class="page active">
        <div class="page-header">
          <h1>Dashboard</h1>
          <button id="refreshDashboardBtn">重新整理</button>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <p>今日預約</p>
            <h2 id="todayCount">0</h2>
          </div>

          <div class="stat-card">
            <p>本月預約</p>
            <h2 id="monthCount">0</h2>
          </div>

          <div class="stat-card">
            <p>待聯絡</p>
            <h2 id="pendingCount">0</h2>
          </div>

          <div class="stat-card">
            <p>已排程</p>
            <h2 id="scheduledCount">0</h2>
          </div>

          <div class="stat-card">
            <p>已完成</p>
            <h2 id="doneCount">0</h2>
          </div>

          <div class="stat-card boss-only">
            <p>待審核帳號</p>
            <h2 id="pendingAccounts">0</h2>
          </div>
        </div>

        <div class="card">
          <h2>最新案件</h2>
          <div id="recentBookings" class="booking-list"></div>
        </div>
      </section>

      <section id="bookingsPage" class="page">
        <div class="page-header">
          <h1>預約案件</h1>
          <button id="refreshBookingsBtn">重新整理</button>
        </div>

        <div id="bookingsList" class="booking-list"></div>
      </section>

      <section id="accountsPage" class="page">
        <div class="page-header">
          <h1>帳號管理</h1>
          <button id="refreshAccountsBtn">重新整理</button>
        </div>

        <div class="card">
          <p class="hint">
            離職員工請按「停用」。停用後無法登入，也不會收到 LINE 通知。
          </p>

          <div id="accountsList" class="accounts-list"></div>
        </div>
      </section>

    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
